
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>公務車雲端管理系統</title>
    
    <!-- 1. 核心框架 (嚴格載入順序) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 2. Lucide 圖示相容性處理 -->
    <script>
        window.react = window.React;
        window.reactDOM = window.ReactDOM;
    </script>
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.js"></script>

    <!-- 3. 編譯引擎 (穩定版) -->
    <script src="https://unpkg.com/@babel/standalone@7.24.2/babel.min.js"></script>

    <!-- 4. Firebase 相容版 SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f1f5f9;
            margin: 0; padding: 0;
            overscroll-behavior-y: contain;
        }
        .app-container { 
            max-width: 448px; 
            margin: 0 auto; 
            min-height: 100vh; 
            background: #ffffff; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tap-active:active { transform: scale(0.96); }
        input, select, button { outline: none !important; }
        input, select { font-size: 16px !important; }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #fff;">
            <div style="width: 35px; height: 35px; border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
            <p style="margin-top: 20px; font-size: 14px; color: #64748b; font-weight: 500;">加密連線中...</p>
        </div>
    </div>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <script type="text/babel">
        // 使用立即執行函數完全隔離作用域，防止 Babel 變數衝突
        (() => {
            const { useState, useEffect, useMemo } = React;
            const lucideIcons = window.LucideReact || {};

            // 安全圖示解析組件
            const Icon = ({ name, size = 20, className = "" }) => {
                const Comp = lucideIcons[name];
                return Comp ? <Comp size={size} className={className} /> : <div style={{width:size, height:size}} className="bg-slate-200 rounded" />;
            };

            // --- Firebase 配置 ---
            const firebaseConfig = {
                apiKey: "AIzaSyAfi4RC-H3lOSQJ_Ja_oUSvl-OuOqgYQiE",
                authDomain: "deafcar-4179b.firebaseapp.com",
                projectId: "deafcar-4179b",
                storageBucket: "deafcar-4179b.firebasestorage.app",
                messagingSenderId: "462190356209",
                appId: "1:462190356209:web:26e132d7f78c66d6d5ab50"
            };

            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            const auth = firebase.auth();
            const COLLECTION_ID = "deafcar-fleet-v12-final"; 

            const FLEET = [
                { id: 'BFG-2353', name: '自排得利卡', plate: 'BFG-2353', type: 'van', hasBooking: false },
                { id: 'AYV-8315', name: '自排小霸王', plate: 'AYV-8315', type: 'truck', hasBooking: false },
                { id: 'BPV-9183', name: '霸王龍', plate: 'BPV-9183', type: 'truck', hasBooking: false },
                { id: 'CBT-2303', name: '冷凍車', plate: 'CBT-2303', type: 'truck', hasBooking: false },
                { id: 'CBV-1603', name: '北屯公務車', plate: 'CBV-1603', type: 'car', hasBooking: true },
            ];

            const App = () => {
                const [activeCar, setActiveCar] = useState(null);
                const [currentTab, setCurrentTab] = useState('logs');
                const [isAuthed, setIsAuthed] = useState(false);
                const [isSettingsLocked, setIsSettingsLocked] = useState(true);
                
                // 狀態管理
                const [uData, setUData] = useState([]);
                const [bData, setBData] = useState([]);
                const [lData, setLData] = useState([]);
                
                // UI 狀態
                const [modal, setModal] = useState({ open: false, type: '', data: {} });
                const [showPassModal, setShowPassModal] = useState(false);
                const [passInput, setPassInput] = useState("");
                const [mFilter, setMFilter] = useState(new Date().toISOString().substring(0, 7));
                const [dFilter, setDFilter] = useState('all');

                // 1. 初始化登入
                useEffect(() => {
                    auth.signInAnonymously().then(() => setIsAuthed(true));
                }, []);

                // 2. 監聽 Firestore 資料
                useEffect(() => {
                    if (!isAuthed) return;
                    const ref = db.collection('artifacts').doc(COLLECTION_ID).collection('public').doc('data');

                    const uUnsub = ref.collection('users').onSnapshot(s => setUData(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    const bUnsub = ref.collection('bookings').onSnapshot(s => setBData(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    const lUnsub = ref.collection('logs').onSnapshot(s => setLData(s.docs.map(d => ({id: d.id, ...d.data()}))));

                    return () => { uUnsub(); bUnsub(); lUnsub(); };
                }, [isAuthed]);

                // 3. 密碼驗證邏輯 (取代當機的 prompt)
                const handleVerifyPassword = (e) => {
                    if (e) e.preventDefault();
                    if (passInput === "22369055") {
                        setIsSettingsLocked(false);
                        setShowPassModal(false);
                        setCurrentTab('settings');
                        setPassInput("");
                    } else {
                        alert("密碼錯誤！");
                        setPassInput("");
                    }
                };

                const handleTabClick = (target) => {
                    if (target === 'settings' && isSettingsLocked) {
                        setShowPassModal(true);
                    } else {
                        setCurrentTab(target);
                    }
                };

                // 4. 資料過濾
                const filteredBookings = useMemo(() => {
                    if (!activeCar) return [];
                    return bData.filter(b => b.vehicleId === activeCar.id)
                        .sort((a, b) => new Date(a.date + 'T' + (a.startTime||'00:00')) - new Date(b.date + 'T' + (b.startTime||'00:00')));
                }, [bData, activeCar]);

                const filteredLogs = useMemo(() => {
                    if (!activeCar) return [];
                    return lData.filter(l => l.vehicleId === activeCar.id)
                        .sort((a, b) => new Date(b.date) - new Date(a.date));
                }, [lData, activeCar]);

                const monthOptions = useMemo(() => {
                    const set = new Set();
                    filteredLogs.forEach(l => l.date && set.add(l.date.substring(0, 7)));
                    return Array.from(set).sort().reverse();
                }, [filteredLogs]);

                const stats = useMemo(() => {
                    let list = filteredLogs;
                    if (mFilter !== 'all') list = list.filter(l => l.date && l.date.startsWith(mFilter));
                    if (dFilter !== 'all') list = list.filter(l => l.userId === dFilter);

                    const mileage = list.reduce((a, b) => a + (Number(b.totalMileage) || 0), 0);
                    const cost = list.reduce((a, b) => a + (Number(b.fuelCost) || 0), 0);
                    const fuel = list.reduce((a, b) => a + (Number(b.fuelLiters) || 0), 0);
                    const drvs = {};
                    list.forEach(i => { if(i.userId) drvs[i.userId] = (drvs[i.userId] || 0) + (Number(i.totalMileage) || 0); });

                    return {
                        mileage, cost, fuel,
                        avg: fuel > 0 ? (mileage / fuel).toFixed(2) : 0,
                        rank: Object.entries(drvs).map(([n, v]) => ({n, v})).sort((a,b) => b.v - a.v)
                    };
                }, [filteredLogs, mFilter, dFilter]);

                const onSave = async (e) => {
                    if (e) e.preventDefault();
                    const collName = modal.type === 'user' ? 'users' : (modal.type === 'booking' ? 'bookings' : 'logs');
                    const coll = db.collection('artifacts').doc(COLLECTION_ID).collection('public').doc('data').collection(collName);
                    
                    let doc = { ...modal.data };
                    if (modal.type !== 'user') doc.vehicleId = activeCar.id;
                    doc.createdAt = firebase.firestore.FieldValue.serverTimestamp();

                    if (modal.type === 'log') {
                        doc.startMileage = Number(doc.startMileage || 0);
                        doc.endMileage = Number(doc.endMileage || 0);
                        doc.totalMileage = doc.endMileage - doc.startMileage;
                        doc.fuelCost = Number(doc.fuelCost || 0);
                        doc.fuelLiters = Number(doc.fuelLiters || 0);
                    }

                    try {
                        await coll.add(doc);
                        setModal({ open: false, type: '', data: {} });
                    } catch (err) { alert("儲存失敗"); }
                };

                const onDelete = async (coll, id) => {
                    if (!window.confirm('確定要刪除嗎？')) return;
                    await db.collection('artifacts').doc(COLLECTION_ID).collection('public').doc('data').collection(coll).doc(id).delete();
                };

                const onExportCSV = () => {
                    if (filteredLogs.length === 0) return;
                    const h = ["日期", "駕駛", "里程起", "里程迄", "行駛里程", "油資", "公升", "地點", "事由"];
                    const b = filteredLogs.map(l => [l.date, l.userId, l.startMileage, l.endMileage, l.totalMileage, l.fuelCost || 0, l.fuelLiters || 0, l.destination, l.reason]);
                    const csv = "\uFEFF" + [h.join(","), ...b.map(r => r.join(","))].join("\n");
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
                    link.download = `${activeCar.plate}_報表.csv`;
                    link.click();
                };

                if (!isAuthed) return null;

                // 視圖：車庫
                if (!activeCar) {
                    return (
                        <div className="app-container p-6 animate-fade">
                            <div className="py-12 text-center">
                                <div className="w-16 h-16 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-5 shadow-xl shadow-blue-100"><Icon name="Car" size={32} className="text-white" /></div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight">公務車管理系統</h1>
                                <p className="text-slate-400 text-xs mt-2 font-bold uppercase tracking-widest">Fleet Operations</p>
                            </div>
                            <div className="grid gap-4">
                                {FLEET.map(v => (
                                    <button key={v.id} onClick={() => { setActiveCar(v); setCurrentTab(v.hasBooking ? 'bookings' : 'logs'); setIsSettingsLocked(true); }} className="w-full bg-white border border-slate-100 p-5 rounded-[2rem] flex items-center gap-5 shadow-sm tap-active transition-all text-left">
                                        <div className="bg-slate-50 p-4 rounded-2xl text-blue-600 shadow-inner">{v.type === 'van' ? <Icon name="Car" /> : <Icon name="Truck" />}</div>
                                        <div className="flex-1"><div className="text-[10px] font-black text-blue-500 uppercase tracking-tighter mb-0.5">{v.plate}</div><div className="text-lg font-bold text-slate-700">{v.name}</div></div>
                                        <Icon name="ChevronRight" className="text-slate-300" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    );
                }

                // 視圖：管理介面
                return (
                    <div className="app-container relative overflow-hidden animate-fade">
                        <header className="bg-white border-b px-4 py-3 flex justify-between items-center shrink-0 z-10">
                            <button onClick={() => setActiveCar(null)} className="p-2 text-slate-400 hover:bg-slate-50 rounded-full transition-colors"><Icon name="ChevronLeft" size={24} /></button>
                            <div className="text-center flex-1"><div className="text-[10px] font-black text-blue-600 tracking-tighter uppercase">{activeCar.plate}</div><h1 className="text-base font-black text-slate-800">{activeCar.name}</h1></div>
                            <div className="w-10"></div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-5 pb-28">
                            {currentTab === 'bookings' && activeCar.hasBooking && (
                                <div className="space-y-5 animate-fade">
                                    <div className="flex justify-between items-center"><h2 className="font-black text-slate-800 text-lg flex items-center gap-2"><Icon name="Calendar" className="text-blue-500"/> 預約表</h2><button onClick={() => setModal({open:true, type:'booking', data:{}})} className="bg-blue-600 text-white p-2.5 rounded-full shadow-lg tap-active"><Icon name="Plus"/></button></div>
                                    {filteredBookings.length === 0 ? <div className="text-center py-20 text-slate-300 font-bold text-sm">暫無預約資料</div> : filteredBookings.map(b => (
                                        <div key={b.id} className="bg-white p-5 rounded-3xl border border-slate-100 flex gap-5 shadow-sm">
                                            <div className="bg-blue-50 text-blue-600 p-3 rounded-2xl text-center min-w-[65px] flex flex-col justify-center"><div className="text-sm font-black">{b.date?.split('-')[1]}/{b.date?.split('-')[2]}</div><div className="text-[10px] font-bold opacity-60 uppercase">{b.date?.split('-')[0]}</div></div>
                                            <div className="flex-1"><div className="font-bold text-slate-700 flex justify-between items-start"><span>{b.reason}</span><button onClick={() => onDelete('bookings', b.id)} className="text-slate-200 hover:text-red-500 transition-colors"><Icon name="Trash2" size={16}/></button></div><div className="text-xs text-slate-400 mt-2 font-medium flex items-center gap-2"><Icon name="Clock" size={14} className="text-blue-300"/> {b.startTime} - {b.endTime}</div><div className="text-xs text-slate-500 mt-1 font-black flex items-center gap-2"><Icon name="User" size={14} className="text-blue-300"/> {b.applicant}</div></div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {currentTab === 'logs' && (
                                <div className="space-y-5 animate-fade">
                                    <div className="flex justify-between items-center"><h2 className="font-black text-slate-800 text-lg flex items-center gap-2"><Icon name="ClipboardList" className="text-green-500"/> 行車記錄</h2><button onClick={() => setModal({open:true, type:'log', data:{}})} className="bg-green-600 text-white p-2.5 rounded-full shadow-lg tap-active"><Icon name="Plus"/></button></div>
                                    {filteredLogs.length === 0 ? <div className="text-center py-20 text-slate-300 font-bold text-sm uppercase">No Records</div> : filteredLogs.map(l => (
                                        <div key={l.id} className="bg-white p-5 rounded-3xl border border-slate-100 space-y-4 shadow-sm">
                                            <div className="flex justify-between items-center"><span className="text-[11px] font-black text-slate-400 bg-slate-50 px-2 py-1 rounded uppercase">{l.date}</span><button onClick={() => onDelete('logs', l.id)} className="text-slate-200 hover:text-red-500 p-1"><Icon name="Trash2" size={16}/></button></div>
                                            <div className="flex justify-between items-end"><div className="flex-1"><div className="font-bold text-slate-800 text-lg flex items-center gap-1.5"><Icon name="MapPin" size={16} className="text-red-400"/> {l.destination}</div><div className="text-xs text-slate-400 mt-1 font-medium">{l.userId} | {l.reason}</div></div><div className="text-right text-green-600 font-black"><span className="text-2xl">+{l.totalMileage}</span><span className="text-[10px] ml-1 uppercase font-bold">km</span></div></div>
                                            {l.fuelCost > 0 && <div className="text-[10px] font-black text-amber-600 bg-amber-50 px-2 py-1 rounded-lg inline-flex items-center gap-1"><Icon name="Fuel" size={10}/> ${l.fuelCost} / {l.fuelLiters}L</div>}
                                        </div>
                                    ))}
                                </div>
                            )}

                            {currentTab === 'dashboard' && (
                                <div className="space-y-6 animate-fade">
                                    <div className="flex gap-3">
                                        <select className="flex-1 bg-white border border-slate-100 rounded-2xl p-4 text-xs font-black shadow-sm outline-none" value={mFilter} onChange={e => setMFilter(e.target.value)}><option value="all">全部月份</option>{monthOptions.map(m => <option key={m} value={m}>{m}</option>)}</select>
                                        <select className="flex-1 bg-white border border-slate-100 rounded-2xl p-4 text-xs font-black shadow-sm outline-none" value={dFilter} onChange={e => setDFilter(e.target.value)}><option value="all">全部駕駛</option>{uData.map(u => <option key={u.id} value={u.name}>{u.name}</option>)}</select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="col-span-2 bg-blue-600 p-6 rounded-[2.5rem] text-white shadow-xl shadow-blue-100 relative overflow-hidden">
                                            <div className="text-xs font-black opacity-70 uppercase tracking-widest mb-1">本月行駛總里程</div>
                                            <div className="text-5xl font-black tracking-tighter">{stats.mileage.toLocaleString()} <span className="text-base font-normal opacity-60 uppercase">km</span></div>
                                            <div className="absolute -right-4 -bottom-4 opacity-10"><Icon name="BarChart3" size={120}/></div>
                                        </div>
                                        <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-50"><div className="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">累積油資</div><div className="text-2xl font-black text-slate-700 tracking-tighter">${stats.cost.toLocaleString()}</div></div>
                                        <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-50"><div className="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">平均油耗</div><div className="text-2xl font-black text-green-600 tracking-tighter">{stats.avg} <span className="text-[10px] font-bold opacity-60 uppercase">km/L</span></div></div>
                                    </div>
                                </div>
                            )}

                            {currentTab === 'settings' && (
                                <div className="space-y-6 animate-fade">
                                    <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 divide-y divide-slate-50 overflow-hidden">
                                        <div className="p-6 text-center"><button onClick={onExportCSV} className="w-full flex justify-between items-center p-5 bg-slate-900 text-white rounded-3xl shadow-xl tap-active transition-all"><div className="flex items-center gap-4 text-left"><Icon name="Download" size={24} /><div><div className="text-sm font-black uppercase">下載數據報表</div><div className="text-[10px] font-bold opacity-50 uppercase tracking-tighter">Excel CSV 格式</div></div></div><Icon name="ChevronRight" size={20} /></button></div>
                                        <div className="p-6">
                                            <div className="flex justify-between items-center mb-5"><h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">人員清單管理</h3><button onClick={() => { setIsSettingsLocked(true); setCurrentTab('logs'); }} className="text-[10px] font-bold text-red-400 uppercase border border-red-100 px-2 py-1 rounded-full">鎖定設定</button></div>
                                            <div className="space-y-3">
                                                {uData.map(u => (<div key={u.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl group"><span className="font-bold text-slate-700 flex items-center gap-3"><Icon name="User" size={18} className="text-blue-400"/> {u.name}</span><button onClick={() => onDelete('users', u.id)} className="text-red-200 hover:text-red-500 transition-colors p-1 active:scale-90"><Icon name="Trash2" size={18}/></button></div>))}
                                                <button onClick={() => setModal({open:true, type:'user', data:{}})} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 text-sm font-black flex items-center justify-center gap-2 tap-active transition-all uppercase tracking-tighter">+ 新增人員名單</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>

                        <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[448px] bg-white/95 backdrop-blur-xl border-t border-slate-100 flex justify-around py-4 pb-8 z-40 shadow-inner">
                            {activeCar.hasBooking && (<button onClick={() => handleTabClick('bookings')} className={`flex flex-col items-center gap-1.5 transition-all ${currentTab==='bookings'?'text-blue-600 scale-110 font-black':'text-slate-300'}`}><Icon name="Calendar" size={22}/><span className="text-[10px] uppercase font-bold">預約</span></button>)}
                            <button onClick={() => handleTabClick('logs')} className={`flex flex-col items-center gap-1.5 transition-all ${currentTab==='logs'?'text-green-600 scale-110 font-black':'text-slate-300'}`}><Icon name="ClipboardList" size={22}/><span className="text-[10px] uppercase font-bold">記錄</span></button>
                            <button onClick={() => handleTabClick('dashboard')} className={`flex flex-col items-center gap-1.5 transition-all ${currentTab==='dashboard'?'text-purple-600 scale-110 font-black':'text-slate-300'}`}><Icon name="BarChart3" size={22}/><span className="text-[10px] uppercase font-bold">統計</span></button>
                            <button onClick={() => handleTabChange('settings')} className={`flex flex-col items-center gap-1.5 transition-all ${currentTab==='settings'?'text-slate-900 scale-110 font-black':'text-slate-300'}`}><Icon name="Settings" size={22}/><span className="text-[10px] uppercase font-bold">設定</span></button>
                        </nav>

                        {/* 密碼彈窗 (取代 prompt) */}
                        {showPassModal && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
                                <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl animate-fade">
                                    <div className="text-center mb-6">
                                        <div className="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-400"><Icon name="Lock" size={24}/></div>
                                        <h3 className="text-xl font-black text-slate-800">管理員驗證</h3>
                                        <p className="text-slate-400 text-xs mt-1">進入設定頁面需輸入密碼</p>
                                    </div>
                                    <form onSubmit={handleVerifyPassword}>
                                        <input 
                                            autoFocus type="password" 
                                            className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-center text-xl tracking-widest mb-4" 
                                            placeholder="••••••••" 
                                            value={passInput} 
                                            onChange={e => setPassInput(e.target.value)}
                                        />
                                        <div className="flex gap-3">
                                            <button type="button" onClick={() => setShowPassModal(false)} className="flex-1 py-4 font-bold text-slate-400 bg-slate-100 rounded-2xl tap-active transition-all">取消</button>
                                            <button type="submit" className="flex-1 py-4 font-bold text-white bg-blue-600 rounded-2xl tap-active transition-all shadow-lg shadow-blue-200">登入</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {modal.open && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-end justify-center">
                                <div className="bg-white w-full max-w-[448px] rounded-t-[3.5rem] p-8 shadow-2xl animate-fade overflow-y-auto max-h-[90vh]">
                                    <div className="flex justify-between items-center mb-8 shrink-0"><h3 className="text-2xl font-black text-slate-800 tracking-tight">{modal.type==='user'?'新增系統人員':modal.type==='booking'?'預約車輛登記':'新增行車記錄'}</h3><button onClick={() => setModal({...modal, open:false})} className="p-2.5 bg-slate-100 rounded-full text-slate-400 active:scale-90"><Icon name="X"/></button></div>
                                    <form onSubmit={onSave} className="space-y-6">
                                        {modal.type === 'user' && (<div><label className="text-[10px] font-black text-slate-400 block mb-2 uppercase">姓名全名</label><input required autoFocus className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" placeholder="例如：林大明" onChange={e => setModal({...modal, data:{...modal.data, name: e.target.value}})}/></div>)}
                                        {modal.type === 'booking' && (<div className="space-y-4">
                                            <input required type="date" className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" onChange={e => setModal({...modal, data:{...modal.data, date: e.target.value}})}/>
                                            <div className="flex gap-4"><input required type="time" className="flex-1 bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700" onChange={e => setModal({...modal, data:{...modal.data, startTime: e.target.value}})}/><input required type="time" className="flex-1 bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700" onChange={e => setModal({...modal, data:{...modal.data, endTime: e.target.value}})}/></div>
                                            <select required className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" onChange={e => setModal({...modal, data:{...modal.data, applicant: e.target.value}})}><option value="">選擇人員</option>{uData.map(u => <option key={u.id} value={u.name}>{u.name}</option>)}</select>
                                            <input required className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" placeholder="用途事由" onChange={e => setModal({...modal, data:{...modal.data, reason: e.target.value}})}/>
                                        </div>)}
                                        {modal.type === 'log' && (<div className="space-y-4">
                                            <input required type="date" className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" onChange={e => setModal({...modal, data:{...modal.data, date: e.target.value}})}/>
                                            <div className="flex gap-4">
                                                <div className="flex-1"><label className="text-[10px] font-bold text-slate-400 mb-1 block ml-1 uppercase">起點里程</label><input required type="number" className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" onChange={e => setModal({...modal, data:{...modal.data, startMileage: e.target.value}})}/></div>
                                                <div className="flex-1"><label className="text-[10px] font-bold text-slate-400 mb-1 block ml-1 uppercase">終點里程</label><input required type="number" className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" onChange={e => setModal({...modal, data:{...modal.data, endMileage: e.target.value}})}/></div>
                                            </div>
                                            <div className="bg-amber-50/50 p-6 rounded-3xl border border-amber-100/50 space-y-4">
                                                <div className="text-[10px] font-black text-amber-600 flex items-center gap-1.5 uppercase"><Icon name="Fuel" size={12}/> 加油紀錄 (選填)</div>
                                                <div className="flex gap-4"><input type="number" placeholder="金額" className="flex-1 bg-white border-0 rounded-xl p-4 text-sm font-black text-amber-700" onChange={e => setModal({...modal, data:{...modal.data, fuelCost: e.target.value}})}/><input type="number" step="0.01" placeholder="公升" className="flex-1 bg-white border-0 rounded-xl p-4 text-sm font-black text-amber-700" onChange={e => setModal({...modal, data:{...modal.data, fuelLiters: e.target.value}})}/></div>
                                            </div>
                                            <select required className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" onChange={e => setModal({...modal, data:{...modal.data, userId: e.target.value}})}><option value="">選擇駕駛員</option>{uData.map(u => <option key={u.id} value={u.name}>{u.name}</option>)}</select>
                                            <div className="flex gap-4"><input required className="flex-1 bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" placeholder="目的地" onChange={e => setModal({...modal, data:{...modal.data, destination: e.target.value}})}/><input required className="flex-1 bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" placeholder="用途備註" onChange={e => setModal({...modal, data:{...modal.data, reason: e.target.value}})}/></div>
                                        </div>)}
                                        <button type="submit" className="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black shadow-xl tap-active transition-all text-lg uppercase tracking-widest">確認儲存數據</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const rootElement = document.getElementById('root');
            if (rootElement) ReactDOM.createRoot(rootElement).render(<App />);
        })();
    </script>
</body>
</html>
