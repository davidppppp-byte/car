<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蒙恩車輛管理系統</title>
    
    <!-- 1. 核心基礎庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 2. 圖示庫處理 -->
    <script>
        window.react = window.React;
        window.reactDOM = window.ReactDOM;
    </script>
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.js"></script>

    <!-- 3. 編譯引擎 -->
    <script src="https://unpkg.com/@babel/standalone@7.24.2/babel.min.js"></script>

    <!-- 4. Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f1f5f9;
            margin: 0; padding: 0;
            overscroll-behavior-y: contain;
            overflow-x: hidden;
        }
        .app-container { 
            max-width: 448px; 
            margin: 0 auto; 
            min-height: 100vh; 
            background: #ffffff; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 60px rgba(0,0,0,0.1);
        }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tap-active:active { transform: scale(0.96); transition: transform 0.1s; }
        input, select, textarea { font-size: 16px !important; width: 100%; box-sizing: border-box; }
        .break-text { word-break: break-all; white-space: normal; }
        .bg-gradient-blue { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #fff;">
            <div style="width: 35px; height: 35px; border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
            <p style="margin-top: 20px; font-size: 14px; color: #64748b; font-weight: 500;">蒙恩管理系統載入中...</p>
        </div>
    </div>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <script type="text/babel">
        (function() {
            const { useState, useEffect, useMemo } = React;
            
            const Icon = ({ name, size = 20, className = "", color = "currentColor" }) => {
                const lib = window.LucideReact || {};
                const Comp = lib[name];
                if (!Comp) return <div style={{width:size, height:size}} className="bg-slate-100 rounded" />;
                return <Comp size={size} className={className} color={color} />;
            };

            const firebaseConfig = {
                apiKey: "AIzaSyAfi4RC-H3lOSQJ_Ja_oUSvl-OuOqgYQiE",
                authDomain: "deafcar-4179b.firebaseapp.com",
                projectId: "deafcar-4179b",
                storageBucket: "deafcar-4179b.firebasestorage.app",
                messagingSenderId: "462190356209",
                appId: "1:462190356209:web:26e132d7f78c66d6d5ab50"
            };

            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            const auth = firebase.auth();
            const STORAGE_KEY = "蒙恩車輛管理系統-v23"; 

            const VEHICLES = [
                { id: 'BFG-2353', name: '自排得利卡', plate: 'BFG-2353', type: 'van', hasBooking: false },
                { id: 'AYV-8315', name: '自排小霸王', plate: 'AYV-8315', type: 'truck', hasBooking: false },
                { id: 'BPV-9183', name: '霸王龍', plate: 'BPV-9183', type: 'truck', hasBooking: false },
                { id: 'CBT-2303', name: '冷凍車', plate: 'CBT-2303', type: 'truck', hasBooking: false },
                { id: 'CBV-1603', name: '北屯公務車', plate: 'CBV-1603', type: 'car', hasBooking: true },
            ];

            const App = () => {
                const [selectedCar, setSelectedCar] = useState(null);
                const [currentTab, setCurrentTab] = useState('logs');
                const [isAuthed, setIsAuthed] = useState(false);
                const [isSettingsLocked, setIsSettingsLocked] = useState(true);
                
                const [uData, setUData] = useState([]);
                const [bData, setBData] = useState([]);
                const [lData, setLData] = useState([]);
                const [vSettings, setVSettings] = useState({});
                
                const [modal, setModal] = useState({ open: false, type: '', data: {} });
                const [passModal, setPassModal] = useState(false);
                const [passInput, setPassInput] = useState("");
                const [mFilter, setMFilter] = useState(new Date().toISOString().substring(0, 7));
                const [dFilter, setDFilter] = useState('all');

                useEffect(() => {
                    auth.signInAnonymously().then(() => setIsAuthed(true));
                }, []);

                useEffect(() => {
                    if (!isAuthed) return;
                    const root = db.collection('artifacts').doc(STORAGE_KEY).collection('public').doc('data');
                    const uUnsub = root.collection('users').onSnapshot(s => setUData(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    const bUnsub = root.collection('bookings').onSnapshot(s => setBData(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    const lUnsub = root.collection('logs').onSnapshot(s => setLData(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    const vUnsub = root.collection('vehicleSettings').onSnapshot(s => {
                        const settingsMap = {};
                        s.docs.forEach(d => settingsMap[d.id] = d.data());
                        setVSettings(settingsMap);
                    });
                    return () => { uUnsub(); bUnsub(); lUnsub(); vUnsub(); };
                }, [isAuthed]);

                const handleVerifyPassword = (e) => {
                    if (e) e.preventDefault();
                    if (passInput === "22369055") {
                        setIsSettingsLocked(false);
                        setPassModal(false);
                        setCurrentTab('settings');
                        setPassInput("");
                    } else { alert("密碼錯誤！"); setPassInput(""); }
                };

                const switchTab = (target) => {
                    if (target === 'settings' && isSettingsLocked) { setPassModal(true); } 
                    else { setCurrentTab(target); }
                };

                const filteredLogs = useMemo(() => {
                    if (!selectedCar) return [];
                    return lData.filter(l => l.vehicleId === selectedCar.id)
                        .sort((a, b) => new Date(b.date + 'T' + (b.startTime||'00:00')) - new Date(a.date + 'T' + (a.startTime||'00:00'))).reverse();
                }, [lData, selectedCar]);

                const autoStartMileage = useMemo(() => {
                    if (!selectedCar) return 0;
                    const carLogs = lData.filter(l => l.vehicleId === selectedCar.id)
                        .sort((a, b) => new Date(b.date + 'T' + (b.startTime||'00:00')) - new Date(a.date + 'T' + (a.startTime||'00:00')));
                    if (carLogs.length > 0) return Number(carLogs[0].endMileage) || 0;
                    return Number(vSettings[selectedCar.id]?.initialMileage) || 0;
                }, [lData, selectedCar, vSettings]);

                const onSave = async (e) => {
                    if (e) e.preventDefault();
                    const collName = modal.type === 'user' ? 'users' : (modal.type === 'booking' ? 'bookings' : 'logs');
                    const coll = db.collection('artifacts').doc(STORAGE_KEY).collection('public').doc('data').collection(collName);
                    let docData = { ...modal.data };
                    if (modal.type !== 'user') docData.vehicleId = selectedCar.id;
                    docData.createdAt = firebase.firestore.FieldValue.serverTimestamp();

                    if (modal.type === 'log') {
                        docData.startMileage = autoStartMileage;
                        const end = Number(docData.endMileage || 0);
                        docData.totalMileage = end - autoStartMileage;
                        docData.fuelCost = Number(docData.fuelCost || 0);
                        docData.fuelLiters = Number(docData.fuelLiters || 0);
                    }
                    try {
                        await coll.add(docData);
                        setModal({ open: false, type: '', data: {} });
                    } catch (err) { alert("儲存失敗"); }
                };

                const updateInitialMileage = async (vId, value) => {
                    const ref = db.collection('artifacts').doc(STORAGE_KEY).collection('public').doc('data').collection('vehicleSettings').doc(vId);
                    await ref.set({ initialMileage: Number(value) }, { merge: true });
                };

                const openLogModal = () => {
                    const now = new Date();
                    const startTime = now.toTimeString().substring(0, 5);
                    const dateStr = now.toISOString().substring(0, 10);
                    setModal({ 
                        open: true, 
                        type: 'log', 
                        data: { date: dateStr, startTime: startTime, endTime: "" } 
                    });
                };

                if (!isAuthed) return null;

                if (!selectedCar) {
                    return (
                        <div className="app-container p-6 animate-fade">
                            <div className="py-12 text-center">
                                <div className="w-16 h-16 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-5 shadow-xl shadow-blue-100"><Icon name="Car" size={32} className="text-white" /></div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight">蒙恩車輛管理系統</h1>
                                <p className="text-slate-400 text-xs mt-1 font-bold uppercase tracking-widest">Fleet Operations</p>
                            </div>
                            <div className="grid gap-4">
                                {VEHICLES.map(v => (
                                    <button key={v.id} onClick={() => { setSelectedCar(v); switchTab(v.hasBooking ? 'bookings' : 'logs'); setIsSettingsLocked(true); }} className="w-full bg-white border border-slate-100 p-5 rounded-[2rem] flex items-center gap-5 shadow-sm tap-active transition-all text-left">
                                        <div className="bg-slate-50 p-4 rounded-2xl text-blue-600 shadow-inner">{v.type === 'van' ? <Icon name="Car" /> : <Icon name="Truck" />}</div>
                                        <div className="flex-1"><div className="text-[10px] font-black text-blue-500 uppercase tracking-tighter mb-0.5">{v.plate}</div><div className="text-lg font-bold text-slate-700">{v.name}</div></div>
                                        <Icon name="ChevronRight" className="text-slate-300" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="app-container relative overflow-hidden animate-fade">
                        <header className="bg-white border-b px-4 py-3 flex justify-between items-center shrink-0 z-10 shadow-sm">
                            <button onClick={() => setSelectedCar(null)} className="p-2 text-slate-400 hover:bg-slate-100 rounded-full transition-all active:scale-90"><Icon name="ChevronLeft" size={28} /></button>
                            <div className="text-center flex-1">
                                <div className="text-[10px] font-black text-blue-600 tracking-tighter uppercase">{selectedCar.plate}</div>
                                <h1 className="text-base font-black text-slate-800">{selectedCar.name}</h1>
                            </div>
                            <div className="w-10"></div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-5 pb-28">
                            {currentTab === 'logs' && (
                                <div className="space-y-5">
                                    <div className="flex justify-between items-center"><h2 className="font-black text-slate-800 text-lg flex items-center gap-2"><Icon name="ClipboardList" className="text-green-500"/> 行車記錄</h2><button onClick={openLogModal} className="bg-green-600 text-white p-2.5 rounded-full shadow-lg tap-active"><Icon name="Plus"/></button></div>
                                    {filteredLogs.length === 0 ? <div className="text-center py-20 text-slate-300 font-bold text-sm">尚無記錄</div> : filteredLogs.map(l => (
                                        <div key={l.id} className="bg-white p-5 rounded-3xl border border-slate-100 space-y-4 shadow-sm animate-fade">
                                            <div className="flex justify-between items-center">
                                                <div className="flex flex-wrap gap-2">
                                                    <span className="text-[11px] font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded tracking-tighter">日期：{l.date}</span>
                                                    <span className="text-[11px] font-bold text-blue-500 bg-blue-50 px-2 py-1 rounded tracking-tighter">時間：{l.startTime} - {l.endTime || '??:??'}</span>
                                                </div>
                                                <button onClick={() => db.collection('artifacts').doc(STORAGE_KEY).collection('public').doc('data').collection('logs').doc(l.id).delete()} className="text-slate-200 hover:text-red-500 p-1"><Icon name="Trash2" size={16}/></button>
                                            </div>
                                            <div className="flex justify-between items-end gap-2">
                                                <div className="flex-1"><div className="font-bold text-slate-800 text-lg flex items-center gap-1.5 break-text"><Icon name="MapPin" size={16} className="text-red-400 shrink-0"/> {l.destination}</div><div className="text-xs text-slate-400 mt-1 font-medium break-text">{l.userId} | {l.reason}</div></div>
                                                <div className="text-right text-green-600 font-black shrink-0"><span className="text-2xl">+{l.totalMileage}</span><span className="text-[10px] ml-1 uppercase font-bold">km</span></div>
                                            </div>
                                            <div className="flex gap-4 pt-3 border-t border-slate-50 text-[10px] text-slate-400 font-bold uppercase tracking-widest"><span>起點 {l.startMileage}</span><span>終點 {l.endMileage}</span>{l.fuelCost > 0 && <span className="text-amber-600">加油 ${l.fuelCost}</span>}</div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            {/* 其他 Tab (Bookings, Dashboard, Settings) 邏輯以此類推，保持穩定 */}
                            {currentTab === 'settings' && (
                                <div className="space-y-6">
                                    <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 divide-y divide-slate-50 overflow-hidden">
                                        <div className="p-6">
                                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">初始里程設定</h3>
                                            <div className="space-y-4">
                                                {VEHICLES.map(v => (
                                                    <div key={v.id} className="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl">
                                                        <div className="flex-1"><div className="text-[10px] font-black text-blue-600 mb-0.5">{v.plate}</div><div className="text-sm font-bold text-slate-700">{v.name}</div></div>
                                                        <div className="w-28"><input type="number" className="bg-white border border-slate-200 rounded-xl px-3 py-2 text-right font-black text-sm outline-none" value={vSettings[v.id]?.initialMileage || ""} onChange={(e) => updateInitialMileage(v.id, e.target.value)} placeholder="0"/></div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="p-6">
                                            <button onClick={() => { setIsSettingsLocked(true); setCurrentTab('logs'); }} className="w-full py-4 text-xs font-bold text-red-400 border border-red-100 rounded-full tap-active">鎖定管理權限</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>

                        <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[448px] bg-white/95 backdrop-blur-xl border-t border-slate-100 flex justify-around py-4 pb-8 z-40">
                            <button onClick={() => switchTab('logs')} className={`flex flex-col items-center gap-1.5 transition-all ${currentTab==='logs'?'text-green-600 scale-110 font-black':'text-slate-300'}`}><Icon name="ClipboardList" size={22}/><span className="text-[10px]">記錄</span></button>
                            <button onClick={() => switchTab('settings')} className={`flex flex-col items-center gap-1.5 transition-all ${currentTab==='settings'?'text-slate-900 scale-110 font-black':'text-slate-300'}`}><Icon name="Settings" size={22}/><span className="text-[10px]">設定</span></button>
                        </nav>

                        {passModal && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
                                <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl animate-fade">
                                    <div className="text-center mb-6"><h3 className="text-xl font-black text-slate-800">管理員驗證</h3><p className="text-slate-400 text-xs mt-1">密碼 (22369055)</p></div>
                                    <form onSubmit={handleVerifyPassword}><input autoFocus type="password" className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-center text-xl outline-none" placeholder="••••••••" value={passInput} onChange={e => setPassInput(e.target.value)}/><div className="flex gap-3 mt-4"><button type="button" onClick={() => setPassModal(false)} className="flex-1 py-4 font-bold text-slate-400 bg-slate-100 rounded-2xl">取消</button><button type="submit" className="flex-1 py-4 font-bold text-white bg-blue-600 rounded-2xl shadow-lg">驗證</button></div></form>
                                </div>
                            </div>
                        )}

                        {modal.open && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-end justify-center">
                                <div className="bg-white w-full max-w-[448px] rounded-t-[3.5rem] p-8 shadow-2xl animate-fade overflow-y-auto max-h-[90vh]">
                                    <div className="flex justify-between items-center mb-8 shrink-0"><h3 className="text-2xl font-black text-slate-800 tracking-tighter">新增行車記錄</h3><button onClick={() => setModal({...modal, open:false})} className="p-2.5 bg-slate-100 rounded-full text-slate-400 active:scale-90"><Icon name="X"/></button></div>
                                    <form onSubmit={onSave} className="space-y-6">
                                        <div className="bg-blue-50 border border-blue-100 p-5 rounded-3xl flex justify-between items-center shadow-inner">
                                            <div><div className="text-[10px] font-black text-blue-400 uppercase">自動帶入起始里程</div><div className="text-xl font-black text-blue-600">{autoStartMileage} KM</div></div>
                                            <Icon name="Car" size={28} className="text-blue-200" />
                                        </div>
                                        
                                        <div className="space-y-4">
                                            <div className="flex gap-4">
                                                <div className="flex-1"><label className="text-[10px] font-black text-slate-400 mb-1">日期</label><input required type="date" className="w-full bg-slate-50 border-0 rounded-2xl p-4 font-black text-slate-700" value={modal.data.date} onChange={e => setModal({...modal, data:{...modal.data, date: e.target.value}})}/></div>
                                            </div>
                                            
                                            {/* 新增的 開始 與 結束 時間欄位 */}
                                            <div className="flex gap-4">
                                                <div className="flex-1"><label className="text-[10px] font-black text-blue-500 mb-1">開始時間</label><input required type="time" className="w-full bg-slate-50 border-0 rounded-2xl p-4 font-black text-slate-700 shadow-sm" value={modal.data.startTime} onChange={e => setModal({...modal, data:{...modal.data, startTime: e.target.value}})}/></div>
                                                <div className="flex-1"><label className="text-[10px] font-black text-red-500 mb-1">結束時間</label><input required type="time" className="w-full bg-slate-50 border-0 rounded-2xl p-4 font-black text-slate-700 shadow-sm" value={modal.data.endTime} onChange={e => setModal({...modal, data:{...modal.data, endTime: e.target.value}})}/></div>
                                            </div>

                                            <div><label className="text-[10px] font-bold text-slate-400 mb-1 block ml-1 uppercase">結束里程 (KM)</label><input required type="number" className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none focus:ring-2 focus:ring-blue-500" placeholder="輸入數字" onChange={e => setModal({...modal, data:{...modal.data, endMileage: e.target.value}})}/></div>
                                            
                                            <div className="bg-amber-50/50 p-5 rounded-3xl border border-amber-100/50 space-y-3">
                                                <div className="text-[10px] font-black text-amber-600 flex items-center gap-1.5 uppercase"><Icon name="Fuel" size={12}/> 加油紀錄 (選填)</div>
                                                <div className="flex gap-2">
                                                    <div className="flex-1"><input type="number" placeholder="金額" className="w-full bg-white border-0 rounded-xl p-3 text-sm font-black text-amber-700 shadow-sm" onChange={e => setModal({...modal, data:{...modal.data, fuelCost: e.target.value}})}/></div>
                                                    <div className="flex-1"><input type="number" step="0.01" placeholder="公升" className="w-full bg-white border-0 rounded-xl p-3 text-sm font-black text-amber-700 shadow-sm" onChange={e => setModal({...modal, data:{...modal.data, fuelLiters: e.target.value}})}/></div>
                                                </div>
                                            </div>

                                            <select required className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" onChange={e => setModal({...modal, data:{...modal.data, userId: e.target.value}})}><option value="">選擇駕駛員</option>{uData.map(u => <option key={u.id} value={u.name}>{u.name}</option>)}</select>
                                            <div className="space-y-4">
                                                <input required className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" placeholder="行駛目的地" onChange={e => setModal({...modal, data:{...modal.data, destination: e.target.value}})}/>
                                                <textarea required rows="2" className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none resize-none overflow-hidden" placeholder="用途備註" onChange={e => setModal({...modal, data:{...modal.data, reason: e.target.value}})}></textarea>
                                            </div>
                                        </div>
                                        <button type="submit" className="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black shadow-xl tap-active text-lg uppercase">確認儲存數據</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const rootElement = document.getElementById('root');
            if (rootElement) ReactDOM.createRoot(rootElement).render(<App />);
        })();
    </script>
</body>
</html>
