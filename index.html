<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蒙恩車輛管理系統</title>
    
    <!-- 1. 核心基礎庫 (順序極重要：React 必須最先載入) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 2. 手動對應 Lucide 依賴：讓 lucide-react 能夠正確連結 React 全域變數 -->
    <script>
        window.react = window.React;
        window.reactDOM = window.ReactDOM;
    </script>
    <!-- 使用特定穩定版本的 Lucide React -->
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.js"></script>

    <!-- 3. 編譯引擎 (穩定版本) -->
    <script src="https://unpkg.com/@babel/standalone@7.24.2/babel.min.js"></script>

    <!-- 4. Firebase 相容模式 SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f1f5f9;
            margin: 0; padding: 0;
            overscroll-behavior-y: contain;
            overflow-x: hidden;
        }
        .app-container { 
            max-width: 448px; 
            margin: 0 auto; 
            min-height: 100vh; 
            background: #ffffff; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 60px rgba(0,0,0,0.1);
        }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tap-active:active { transform: scale(0.96); transition: transform 0.1s; }
        input, select, textarea { font-size: 16px !important; width: 100%; box-sizing: border-box; }
        .break-text { word-break: break-all; white-space: normal; }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #fff;">
            <div style="width: 35px; height: 35px; border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
            <p style="margin-top: 20px; font-size: 14px; color: #64748b; font-weight: 500;">蒙恩管理系統初始化...</p>
        </div>
    </div>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <script type="text/babel">
        (function() {
            const { useState, useEffect, useMemo } = React;
            
            // 強化版安全圖示解析器：支援多種載入路徑
            const Icon = ({ name, size = 20, className = "", color = "currentColor" }) => {
                const lib = window.LucideReact || window.lucide || {};
                const Comp = lib[name];
                if (!Comp) return <div style={{width:size, height:size}} className="bg-slate-200 rounded" />;
                return <Comp size={size} className={className} color={color} />;
            };

            // Firebase 配置
            const firebaseConfig = {
                apiKey: "AIzaSyAfi4RC-H3lOSQJ_Ja_oUSvl-OuOqgYQiE",
                authDomain: "deafcar-4179b.firebaseapp.com",
                projectId: "deafcar-4179b",
                storageBucket: "deafcar-4179b.firebasestorage.app",
                messagingSenderId: "462190356209",
                appId: "1:462190356209:web:26e132d7f78c66d6d5ab50"
            };

            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            const auth = firebase.auth();
            const STORAGE_KEY = "deafcar-fleet-v20-stable"; 

            const VEHICLES = [
                { id: 'BFG-2353', name: '自排得利卡', plate: 'BFG-2353', type: 'van', hasBooking: false },
                { id: 'AYV-8315', name: '自排小霸王', plate: 'AYV-8315', type: 'truck', hasBooking: false },
                { id: 'BPV-9183', name: '霸王龍', plate: 'BPV-9183', type: 'truck', hasBooking: false },
                { id: 'CBT-2303', name: '冷凍車', plate: 'CBT-2303', type: 'truck', hasBooking: false },
                { id: 'CBV-1603', name: '北屯公務車', plate: 'CBV-1603', type: 'car', hasBooking: true },
            ];

            const App = () => {
                const [selectedCar, setSelectedCar] = useState(null);
                const [currentTab, setCurrentTab] = useState('logs');
                const [isAuthed, setIsAuthed] = useState(false);
                const [isSettingsLocked, setIsSettingsLocked] = useState(true);
                
                const [uData, setUData] = useState([]);
                const [bData, setBData] = useState([]);
                const [lData, setLData] = useState([]);
                
                const [modal, setModal] = useState({ open: false, type: '', data: {} });
                const [passModal, setPassModal] = useState(false);
                const [passInput, setPassInput] = useState("");
                const [mFilter, setMFilter] = useState(new Date().toISOString().substring(0, 7));
                const [dFilter, setDFilter] = useState('all');

                useEffect(() => {
                    auth.signInAnonymously()
                        .then(() => setIsAuthed(true))
                        .catch(err => console.error("Firebase Login Error", err));
                }, []);

                useEffect(() => {
                    if (!isAuthed) return;
                    const ref = db.collection('artifacts').doc(STORAGE_KEY).collection('public').doc('data');
                    const uUnsub = ref.collection('users').onSnapshot(s => setUData(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    const bUnsub = ref.collection('bookings').onSnapshot(s => setBData(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    const lUnsub = ref.collection('logs').onSnapshot(s => setLData(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    return () => { uUnsub(); bUnsub(); lUnsub(); };
                }, [isAuthed]);

                const handleVerifyPassword = (e) => {
                    if (e) e.preventDefault();
                    if (passInput === "22369055") {
                        setIsSettingsLocked(false);
                        setPassModal(false);
                        setCurrentTab('settings');
                        setPassInput("");
                    } else {
                        alert("密碼不正確！");
                        setPassInput("");
                    }
                };

                const switchTab = (target) => {
                    if (target === 'settings' && isSettingsLocked) {
                        setPassModal(true);
                    } else {
                        setCurrentTab(target);
                    }
                };

                const filteredBookings = useMemo(() => {
                    if (!selectedCar) return [];
                    return bData.filter(b => b.vehicleId === selectedCar.id)
                        .sort((a, b) => new Date(a.date + 'T' + (a.startTime||'00:00')) - new Date(b.date + 'T' + (b.startTime||'00:00')));
                }, [bData, selectedCar]);

                const filteredLogs = useMemo(() => {
                    if (!selectedCar) return [];
                    return lData.filter(l => l.vehicleId === selectedCar.id)
                        .sort((a, b) => new Date(b.date) - new Date(a.date));
                }, [lData, selectedCar]);

                const monthOptions = useMemo(() => {
                    const set = new Set();
                    filteredLogs.forEach(l => l.date && set.add(l.date.substring(0, 7)));
                    return Array.from(set).sort().reverse();
                }, [filteredLogs]);

                const stats = useMemo(() => {
                    let list = filteredLogs;
                    if (mFilter !== 'all') list = list.filter(l => l.date && l.date.startsWith(mFilter));
                    if (dFilter !== 'all') list = list.filter(l => l.userId === dFilter);
                    const mileage = list.reduce((a, b) => a + (Number(b.totalMileage) || 0), 0);
                    const cost = list.reduce((a, b) => a + (Number(b.fuelCost) || 0), 0);
                    const fuel = list.reduce((a, b) => a + (Number(b.fuelLiters) || 0), 0);
                    const drvMap = {};
                    list.forEach(i => { if(i.userId) drvMap[i.userId] = (drvMap[i.userId] || 0) + (Number(i.totalMileage) || 0); });
                    return { mileage, cost, fuel, avg: fuel > 0 ? (mileage / fuel).toFixed(2) : 0, rank: Object.entries(drvMap).map(([n, v]) => ({n, v})).sort((a,b) => b.v - a.v) };
                }, [filteredLogs, mFilter, dFilter]);

                const onSave = async (e) => {
                    if (e) e.preventDefault();
                    if (!isAuthed) return;
                    const collName = modal.type === 'user' ? 'users' : (modal.type === 'booking' ? 'bookings' : 'logs');
                    const coll = db.collection('artifacts').doc(STORAGE_KEY).collection('public').doc('data').collection(collName);
                    let docData = { ...modal.data };
                    if (modal.type !== 'user') docData.vehicleId = selectedCar.id;
                    docData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    if (modal.type === 'log') {
                        docData.startMileage = Number(docData.startMileage || 0);
                        docData.endMileage = Number(docData.endMileage || 0);
                        docData.totalMileage = docData.endMileage - docData.startMileage;
                        docData.fuelCost = Number(docData.fuelCost || 0);
                        docData.fuelLiters = Number(docData.fuelLiters || 0);
                    }
                    try {
                        await coll.add(docData);
                        setModal({ open: false, type: '', data: {} });
                    } catch (err) { alert("儲存失敗，請檢查網路連線。"); }
                };

                const onDelete = async (coll, id) => {
                    if (!window.confirm('確定要永久刪除此項記錄嗎？')) return;
                    await db.collection('artifacts').doc(STORAGE_KEY).collection('public').doc('data').collection(coll).doc(id).delete();
                };

                if (!isAuthed) return null;

                // 畫面 A：車輛庫
                if (!selectedCar) {
                    return (
                        <div className="app-container p-6 animate-fade">
                            <div className="py-12 text-center">
                                <div className="w-16 h-16 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-5 shadow-xl shadow-blue-100"><Icon name="Car" size={32} className="text-white" /></div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight">蒙恩車輛管理系統</h1>
                                <p className="text-slate-400 text-xs mt-1 font-bold uppercase tracking-widest">Fleet Operations</p>
                            </div>
                            <div className="grid gap-4">
                                {VEHICLES.map(v => (
                                    <button key={v.id} onClick={() => { setSelectedCar(v); switchTab(v.hasBooking ? 'bookings' : 'logs'); setIsSettingsLocked(true); }} className="w-full bg-white border border-slate-100 p-5 rounded-[2rem] flex items-center gap-5 shadow-sm tap-active transition-all text-left">
                                        <div className="bg-slate-50 p-4 rounded-2xl text-blue-600 shadow-inner">{v.type === 'van' ? <Icon name="Car" /> : <Icon name="Truck" />}</div>
                                        <div className="flex-1"><div className="text-[10px] font-black text-blue-500 uppercase tracking-tighter mb-0.5">{v.plate}</div><div className="text-lg font-bold text-slate-700">{v.name}</div></div>
                                        <Icon name="ChevronRight" className="text-slate-300" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    );
                }

                // 畫面 B：管理介面
                return (
                    <div className="app-container relative overflow-hidden animate-fade">
                        <header className="bg-white border-b px-4 py-3 flex justify-between items-center shrink-0 z-10 shadow-sm">
                            <button onClick={() => setSelectedCar(null)} className="p-2 text-slate-400 hover:bg-slate-100 rounded-full transition-all active:scale-90"><Icon name="ChevronLeft" size={28} /></button>
                            <div className="text-center flex-1">
                                <div className="text-[10px] font-black text-blue-600 tracking-tighter uppercase">{selectedCar.plate}</div>
                                <h1 className="text-base font-black text-slate-800">{selectedCar.name}</h1>
                            </div>
                            <div className="w-10"></div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-5 pb-28">
                            {currentTab === 'bookings' && selectedCar.hasBooking && (
                                <div className="space-y-5 animate-fade">
                                    <div className="flex justify-between items-center"><h2 className="font-black text-slate-800 text-lg flex items-center gap-2"><Icon name="Calendar" className="text-blue-500"/> 預約表</h2><button onClick={() => setModal({open:true, type:'booking', data:{}})} className="bg-blue-600 text-white p-2.5 rounded-full shadow-lg tap-active"><Icon name="Plus"/></button></div>
                                    {filteredBookings.length === 0 ? <div className="text-center py-20 text-slate-300 font-bold text-sm">目前無預約登記</div> : filteredBookings.map(b => (
                                        <div key={b.id} className="bg-white p-5 rounded-3xl border border-slate-100 flex gap-5 shadow-sm">
                                            <div className="bg-blue-50 text-blue-600 p-3 rounded-2xl text-center min-w-[65px] flex flex-col justify-center"><div className="text-sm font-black">{b.date?.split('-')[1]}/{b.date?.split('-')[2]}</div><div className="text-[10px] font-bold opacity-60 uppercase">{b.date?.split('-')[0]}</div></div>
                                            <div className="flex-1">
                                                <div className="font-bold text-slate-700 flex justify-between items-start"><span>{b.reason}</span><button onClick={() => onDelete('bookings', b.id)} className="text-slate-200 hover:text-red-500 transition-colors"><Icon name="Trash2" size={16}/></button></div>
                                                <div className="text-xs text-slate-400 mt-2 flex items-center gap-2 font-medium"><Icon name="Clock" size={14} className="text-blue-300"/> {b.startTime} - {b.endTime}</div>
                                                <div className="text-xs text-slate-500 mt-1 font-black flex items-center gap-2 font-black"><Icon name="User" size={14} className="text-blue-300"/> {b.applicant}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {currentTab === 'logs' && (
                                <div className="space-y-5 animate-fade">
                                    <div className="flex justify-between items-center"><h2 className="font-black text-slate-800 text-lg flex items-center gap-2"><Icon name="ClipboardList" className="text-green-500"/> 行車記錄</h2><button onClick={() => setModal({open:true, type:'log', data:{}})} className="bg-green-600 text-white p-2.5 rounded-full shadow-lg tap-active"><Icon name="Plus"/></button></div>
                                    {filteredLogs.length === 0 ? <div className="text-center py-20 text-slate-300 font-bold text-sm">尚無行駛記錄</div> : filteredLogs.map(l => (
                                        <div key={l.id} className="bg-white p-5 rounded-3xl border border-slate-100 space-y-4 shadow-sm">
                                            <div className="flex justify-between items-center">
                                                <span className="text-[11px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded tracking-tighter uppercase">日期：{l.date}</span>
                                                <button onClick={() => onDelete('logs', l.id)} className="text-slate-200 hover:text-red-500 p-1"><Icon name="Trash2" size={16}/></button>
                                            </div>
                                            <div className="flex justify-between items-end gap-2">
                                                <div className="flex-1"><div className="font-bold text-slate-800 text-lg flex items-center gap-1.5 break-text"><Icon name="MapPin" size={16} className="text-red-400 shrink-0"/> {l.destination}</div><div className="text-xs text-slate-400 mt-1 font-medium break-text">{l.userId} | {l.reason}</div></div>
                                                <div className="text-right text-green-600 font-black shrink-0"><span className="text-2xl">+{l.totalMileage}</span><span className="text-[10px] ml-1 uppercase font-bold">km</span></div>
                                            </div>
                                            {l.fuelCost > 0 && <div className="text-[10px] font-black text-amber-600 bg-amber-50 px-2 py-1 rounded-lg inline-flex items-center gap-1"><Icon name="Fuel" size={10}/> 加油: ${l.fuelCost} / {l.fuelLiters}L</div>}
                                            <div className="flex gap-2 pt-3 border-t border-slate-50 text-[10px] text-slate-400 font-bold"><span>起 {l.startMileage}</span><span>迄 {l.endMileage}</span></div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {currentTab === 'dashboard' && (
                                <div className="space-y-6 animate-fade">
                                    <div className="flex gap-3">
                                        <select className="flex-1 bg-white border border-slate-100 rounded-2xl p-4 text-xs font-black shadow-sm outline-none" value={mFilter} onChange={e => setMFilter(e.target.value)}><option value="all">全部月份</option>{monthOptions.map(m => <option key={m} value={m}>{m}</option>)}</select>
                                        <select className="flex-1 bg-white border border-slate-100 rounded-2xl p-4 text-xs font-black shadow-sm outline-none" value={dFilter} onChange={e => setDFilter(e.target.value)}><option value="all">全部駕駛</option>{uData.map(u => <option key={u.id} value={u.name}>{u.name}</option>)}</select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="col-span-2 bg-blue-600 p-6 rounded-[2.5rem] text-white shadow-xl shadow-blue-100 relative overflow-hidden">
                                            <div className="text-xs font-black opacity-70 uppercase tracking-widest mb-1">本月行駛總里程</div>
                                            <div className="text-5xl font-black tracking-tighter">{stats.mileage.toLocaleString()} <span className="text-base font-normal opacity-60 uppercase">km</span></div>
                                            <div className="absolute -right-4 -bottom-4 opacity-10"><Icon name="BarChart3" size={120}/></div>
                                        </div>
                                        <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-50"><div className="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">累積油資</div><div className="text-2xl font-black text-slate-700 tracking-tighter">${stats.cost.toLocaleString()}</div></div>
                                        <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-50"><div className="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">平均油耗</div><div className="text-2xl font-black text-green-600 tracking-tighter">{stats.avg} <span className="text-[10px] font-bold opacity-60 uppercase font-mono">km/L</span></div></div>
                                    </div>
                                </div>
                            )}

                            {currentTab === 'settings' && (
                                <div className="space-y-6 animate-fade">
                                    <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 divide-y divide-slate-50 overflow-hidden">
                                        <div className="p-6">
                                            <div className="flex justify-between items-center mb-5"><h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">系統人員管理</h3><button onClick={() => { setIsSettingsLocked(true); setCurrentTab('logs'); }} className="text-[10px] font-bold text-red-400 uppercase border border-red-100 px-2 py-1 rounded-full tap-active">鎖定系統</button></div>
                                            <div className="space-y-3">
                                                {uData.map(u => (<div key={u.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl group transition-all"><span className="font-bold text-slate-700 flex items-center gap-3"><Icon name="User" size={18} className="text-blue-400"/> {u.name}</span><button onClick={() => onDelete('users', u.id)} className="text-red-200 hover:text-red-500 transition-colors p-1 active:scale-90"><Icon name="Trash2" size={18}/></button></div>))}
                                                <button onClick={() => setModal({open:true, type:'user', data:{}})} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 text-sm font-black flex items-center justify-center gap-2 tap-active transition-all uppercase tracking-tighter">+ 新增人員名單</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>

                        <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[448px] bg-white/95 backdrop-blur-xl border-t border-slate-100 flex justify-around py-4 pb-8 z-40 shadow-inner">
                            {selectedCar.hasBooking && (<button onClick={() => switchTab('bookings')} className={`flex flex-col items-center gap-1.5 transition-all ${currentTab==='bookings'?'text-blue-600 scale-110 font-black':'text-slate-300'}`}><Icon name="Calendar" size={22}/><span className="text-[10px] uppercase font-bold">預約</span></button>)}
                            <button onClick={() => switchTab('logs')} className={`flex flex-col items-center gap-1.5 transition-all ${currentTab==='logs'?'text-green-600 scale-110 font-black':'text-slate-300'}`}><Icon name="ClipboardList" size={22}/><span className="text-[10px] uppercase font-bold">記錄</span></button>
                            <button onClick={() => switchTab('dashboard')} className={`flex flex-col items-center gap-1.5 transition-all ${currentTab==='dashboard'?'text-purple-600 scale-110 font-black':'text-slate-300'}`}><Icon name="BarChart3" size={22}/><span className="text-[10px] uppercase font-bold">統計</span></button>
                            <button onClick={() => switchTab('settings')} className={`flex flex-col items-center gap-1.5 transition-all ${currentTab==='settings'?'text-slate-900 scale-110 font-black':'text-slate-300'}`}><Icon name="Settings" size={22}/><span className="text-[10px] uppercase font-bold">設定</span></button>
                        </nav>

                        {/* 密碼驗證彈窗 */}
                        {passModal && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
                                <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl animate-fade">
                                    <div className="text-center mb-6">
                                        <div className="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-400"><Icon name="Lock" size={24}/></div>
                                        <h3 className="text-xl font-black text-slate-800 uppercase">管理員驗證</h3>
                                        <p className="text-slate-400 text-xs mt-1 font-bold">請輸入管理設定密碼 (22369055)</p>
                                    </div>
                                    <form onSubmit={handleVerifyPassword}>
                                        <input 
                                            autoFocus type="password" 
                                            className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-center text-xl tracking-widest mb-4 outline-none focus:ring-2 focus:ring-blue-500 shadow-inner" 
                                            placeholder="••••••••" 
                                            value={passInput} 
                                            onChange={e => setPassInput(e.target.value)}
                                        />
                                        <div className="flex gap-3">
                                            <button type="button" onClick={() => setPassModal(false)} className="flex-1 py-4 font-bold text-slate-400 bg-slate-100 rounded-2xl tap-active transition-all">取消</button>
                                            <button type="submit" className="flex-1 py-4 font-bold text-white bg-blue-600 rounded-2xl tap-active shadow-lg shadow-blue-100">驗證</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* 資料新增彈窗 */}
                        {modal.open && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-end justify-center">
                                <div className="bg-white w-full max-w-[448px] rounded-t-[3.5rem] p-8 shadow-2xl animate-fade overflow-y-auto max-h-[90vh]">
                                    <div className="flex justify-between items-center mb-8 shrink-0"><h3 className="text-2xl font-black text-slate-800 tracking-tight tracking-tighter">{modal.type==='user'?'新增系統人員':modal.type==='booking'?'預約車輛登記':'新增行車記錄'}</h3><button onClick={() => setModal({...modal, open:false})} className="p-2.5 bg-slate-100 rounded-full text-slate-400 active:scale-90"><Icon name="X"/></button></div>
                                    <form onSubmit={onSave} className="space-y-6">
                                        {modal.type === 'user' && (<div><label className="text-[10px] font-black text-slate-400 block mb-2 uppercase tracking-widest">人員全名</label><input required autoFocus className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：林大明" onChange={e => setModal({...modal, data:{...modal.data, name: e.target.value}})}/></div>)}
                                        {modal.type === 'booking' && (<div className="space-y-4">
                                            <div><label className="text-[10px] font-black text-slate-400 block mb-1 uppercase tracking-widest">預定日期</label><input required type="date" className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" onChange={e => setModal({...modal, data:{...modal.data, date: e.target.value}})}/></div>
                                            <div className="flex gap-4">
                                                <div className="flex-1"><label className="text-[10px] font-black text-slate-400 block mb-1 uppercase tracking-tighter">起始時間</label><input required type="time" className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700" onChange={e => setModal({...modal, data:{...modal.data, startTime: e.target.value}})}/></div>
                                                <div className="flex-1"><label className="text-[10px] font-black text-slate-400 block mb-1 uppercase tracking-tighter">結束時間</label><input required type="time" className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700" onChange={e => setModal({...modal, data:{...modal.data, endTime: e.target.value}})}/></div>
                                            </div>
                                            <select required className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" onChange={e => setModal({...modal, data:{...modal.data, applicant: e.target.value}})}><option value="">選擇人員</option>{uData.map(u => <option key={u.id} value={u.name}>{u.name}</option>)}</select>
                                            <input required className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" placeholder="用途事由" onChange={e => setModal({...modal, data:{...modal.data, reason: e.target.value}})}/>
                                        </div>)}
                                        {modal.type === 'log' && (<div className="space-y-4">
                                            <div><label className="text-[10px] font-black text-slate-400 block mb-1 uppercase tracking-widest">實際行駛日期</label><input required type="date" className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" onChange={e => setModal({...modal, data:{...modal.data, date: e.target.value}})}/></div>
                                            <div className="flex gap-3">
                                                <div className="flex-1"><label className="text-[10px] font-bold text-slate-400 mb-1 block ml-1 uppercase tracking-tighter">起始里程</label><input required type="number" className="w-full bg-slate-50 border-0 rounded-2xl p-4 font-black text-slate-700 outline-none" onChange={e => setModal({...modal, data:{...modal.data, startMileage: e.target.value}})}/></div>
                                                <div className="flex-1"><label className="text-[10px] font-bold text-slate-400 mb-1 block ml-1 uppercase tracking-tighter">結束里程</label><input required type="number" className="w-full bg-slate-50 border-0 rounded-2xl p-4 font-black text-slate-700 outline-none" onChange={e => setModal({...modal, data:{...modal.data, endMileage: e.target.value}})}/></div>
                                            </div>
                                            
                                            <div className="bg-amber-50/50 p-5 rounded-3xl border border-amber-100/50 space-y-3">
                                                <div className="text-[10px] font-black text-amber-600 flex items-center gap-1.5 uppercase tracking-widest"><Icon name="Fuel" size={12}/> 加油紀錄 (選填)</div>
                                                <div className="flex gap-2">
                                                    <div className="flex-1"><label className="text-[9px] font-bold text-amber-500 mb-1 block uppercase">金額</label><input type="number" placeholder="$0" className="w-full bg-white border-0 rounded-xl p-3 text-sm font-black text-amber-700 shadow-sm" onChange={e => setModal({...modal, data:{...modal.data, fuelCost: e.target.value}})}/></div>
                                                    <div className="flex-1"><label className="text-[9px] font-bold text-amber-500 mb-1 block uppercase">公升</label><input type="number" step="0.01" placeholder="0L" className="w-full bg-white border-0 rounded-xl p-3 text-sm font-black text-amber-700 shadow-sm" onChange={e => setModal({...modal, data:{...modal.data, fuelLiters: e.target.value}})}/></div>
                                                </div>
                                            </div>

                                            <select required className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" onChange={e => setModal({...modal, data:{...modal.data, userId: e.target.value}})}><option value="">選擇駕駛員</option>{uData.map(u => <option key={u.id} value={u.name}>{u.name}</option>)}</select>
                                            
                                            <div className="space-y-4">
                                                <input required className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none" placeholder="行駛目的地" onChange={e => setModal({...modal, data:{...modal.data, destination: e.target.value}})}/>
                                                <textarea required rows="2" className="w-full bg-slate-50 border-0 rounded-2xl p-5 font-black text-slate-700 outline-none resize-none overflow-hidden" placeholder="用途備註" onChange={e => setModal({...modal, data:{...modal.data, reason: e.target.value}})}></textarea>
                                            </div>
                                        </div>)}
                                        <button type="submit" className="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black shadow-xl tap-active transition-all text-lg uppercase tracking-widest">確認儲存數據</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const mount = document.getElementById('root');
            if (mount) {
                ReactDOM.createRoot(mount).render(<App />);
            }
        })();
    </script>
</body>
</html>
