<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公務車雲端管理系統</title>
    
    <!-- 引入穩定版核心庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 使用較舊但相容性更好的 Babel 版本以解決 Infinity 衝突 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>
    
    <!-- 引入 Lucide 圖示 -->
    <script src="https://unpkg.com/lucide-react"></script>

    <!-- 引入 Firebase 相容版 SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
        }
        .app-container { max-width: 448px; margin: 0 auto; min-height: 100vh; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root">
        <!-- 初始加載狀態 -->
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
            <div style="font-size: 14px; color: #64748b;">系統啟動中...</div>
        </div>
    </div>

    <!-- 錯誤捕捉腳本 -->
    <script>
        window.onerror = function(msg, url, line) {
            document.getElementById('root').innerHTML = 
                '<div style="padding: 20px; color: red; font-size: 12px;">系統載入失敗：' + msg + '<br>位置：' + line + '行</div>';
        };
    </script>

    <script type="text/babel">
        // 變數宣告
        const { useState, useEffect, useMemo } = React;
        const Icons = window.LucideReact;

        // 安全圖示組件
        const SafeIcon = (props) => {
            const { name, size = 20, className = "" } = props;
            const IconComponent = Icons[name];
            if (!IconComponent) return <span style={{display:'inline-block', width:size, height:size, background:'#e2e8f0', borderRadius:'2px'}}></span>;
            return <IconComponent size={size} className={className} />;
        };

        // --- Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyAfi4RC-H3lOSQJ_Ja_oUSvl-OuOqgYQiE",
            authDomain: "deafcar-4179b.firebaseapp.com",
            projectId: "deafcar-4179b",
            storageBucket: "deafcar-4179b.firebasestorage.app",
            messagingSenderId: "462190356209",
            appId: "1:462190356209:web:26e132d7f78c66d6d5ab50"
        };

        // 初始化
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();
        const DATABASE_ROOT_ID = "deafcar-fleet-v4"; 

        const VEHICLES_LIST = [
            { id: 'BFG-2353', name: '自排得利卡', plate: 'BFG-2353', type: 'van', hasBooking: false },
            { id: 'AYV-8315', name: '自排小霸王', plate: 'AYV-8315', type: 'truck', hasBooking: false },
            { id: 'BPV-9183', name: '霸王龍', plate: 'BPV-9183', type: 'truck', hasBooking: false },
            { id: 'CBT-2303', name: '冷凍車', plate: 'CBT-2303', type: 'truck', hasBooking: false },
            { id: 'CBV-1603', name: '北屯公務車', plate: 'CBV-1603', type: 'car', hasBooking: true },
        ];

        const App = () => {
            const [selectedVehicle, setSelectedVehicle] = useState(null);
            const [activeTab, setActiveTab] = useState('logs');
            const [authState, setAuthState] = useState({ loading: true, user: null });
            
            const [users, setUsers] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [logs, setLogs] = useState([]);
            
            const [modal, setModal] = useState({ open: false, type: '', data: {} });
            const [monthFilter, setMonthFilter] = useState(new Date().toISOString().substring(0, 7));
            const [driverFilter, setDriverFilter] = useState('all');

            // 1. 處理登入
            useEffect(() => {
                const unsubAuth = auth.onAuthStateChanged(async (u) => {
                    if (!u) {
                        try { await auth.signInAnonymously(); } catch(e) {}
                    } else {
                        setAuthState({ loading: false, user: u });
                    }
                });
                return () => unsubAuth();
            }, []);

            // 2. 監聽資料
            useEffect(() => {
                if (!authState.user) return;
                
                const dataPath = db.collection('artifacts').doc(DATABASE_ROOT_ID).collection('public').doc('data');

                const unsubU = dataPath.collection('users').onSnapshot(s => setUsers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubB = dataPath.collection('bookings').onSnapshot(s => setBookings(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubL = dataPath.collection('logs').onSnapshot(s => setLogs(s.docs.map(d => ({id: d.id, ...d.data()}))));

                return () => { unsubU(); unsubB(); unsubL(); };
            }, [authState.user]);

            // 資料運算
            const filteredBookings = useMemo(() => {
                if (!selectedVehicle) return [];
                return bookings
                    .filter(b => b.vehicleId === selectedVehicle.id)
                    .sort((a, b) => new Date(a.date + 'T' + a.startTime) - new Date(b.date + 'T' + b.startTime));
            }, [bookings, selectedVehicle]);

            const filteredLogs = useMemo(() => {
                if (!selectedVehicle) return [];
                return logs
                    .filter(l => l.vehicleId === selectedVehicle.id)
                    .sort((a, b) => new Date(b.date) - new Date(a.date)).reverse();
            }, [logs, selectedVehicle]);

            const stats = useMemo(() => {
                let list = filteredLogs;
                if (monthFilter !== 'all') list = list.filter(l => l.date && l.date.startsWith(monthFilter));
                if (driverFilter !== 'all') list = list.filter(l => l.userId === driverFilter);

                const miles = list.reduce((a, b) => a + (Number(b.totalMileage) || 0), 0);
                const cost = list.reduce((a, b) => a + (Number(b.fuelCost) || 0), 0);
                const liters = list.reduce((a, b) => a + (Number(b.fuelLiters) || 0), 0);
                
                const rankingMap = {};
                list.forEach(l => { if(l.userId) rankingMap[l.userId] = (rankingMap[l.userId] || 0) + (Number(l.totalMileage) || 0); });

                return {
                    totalMiles: miles,
                    totalCost: cost,
                    totalLiters: liters,
                    avg: liters > 0 ? (miles / liters).toFixed(2) : 0,
                    rank: Object.entries(rankingMap).map(([n, m]) => ({n, m})).sort((a,b) => b.m - a.m)
                };
            }, [filteredLogs, monthFilter, driverFilter]);

            const handleSave = async (e) => {
                e.preventDefault();
                const collRef = db.collection('artifacts').doc(DATABASE_ROOT_ID).collection('public').doc('data').collection(modal.type === 'user' ? 'users' : modal.type === 'booking' ? 'bookings' : 'logs');
                
                let docData = { ...modal.data };
                if (modal.type !== 'user') docData.vehicleId = selectedVehicle.id;
                docData.createdAt = firebase.firestore.FieldValue.serverTimestamp();

                if (modal.type === 'log') {
                    const s = Number(docData.startMileage || 0);
                    const eM = Number(docData.endMileage || 0);
                    docData.totalMileage = eM - s;
                    docData.fuelCost = Number(docData.fuelCost || 0);
                    docData.fuelLiters = Number(docData.fuelLiters || 0);
                }

                await collRef.add(docData);
                setModal({ open: false, type: '', data: {} });
            };

            if (authState.loading) return <div className="flex items-center justify-center h-screen"><div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div></div>;

            // 首頁：選擇車輛
            if (!selectedVehicle) {
                return (
                    <div className="app-container p-6">
                        <div className="py-10 text-center">
                            <div className="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                                <SafeIcon name="Car" color="white" size={32} />
                            </div>
                            <h1 className="text-2xl font-black text-slate-800">公務車管理系統</h1>
                            <p className="text-slate-400 text-xs mt-1">請選擇車輛進入</p>
                        </div>
                        <div className="space-y-3">
                            {VEHICLES_LIST.map(v => (
                                <button key={v.id} onClick={() => { setSelectedVehicle(v); setActiveTab(v.hasBooking ? 'bookings' : 'logs'); }} className="w-full bg-white border border-slate-100 p-4 rounded-2xl flex items-center gap-4 shadow-sm active:scale-95 transition-all text-left">
                                    <div className="bg-slate-50 p-3 rounded-xl">{v.type === 'van' ? <SafeIcon name="Car" /> : <SafeIcon name="Truck" />}</div>
                                    <div className="flex-1"><div className="text-[10px] font-bold text-blue-600 uppercase">{v.plate}</div><div className="font-bold text-slate-700">{v.name}</div></div>
                                    <SafeIcon name="ChevronRight" className="text-slate-300" />
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            // 內頁
            return (
                <div className="app-container flex flex-col relative overflow-hidden">
                    <header className="bg-white border-b px-4 py-3 flex justify-between items-center shrink-0">
                        <button onClick={() => setSelectedVehicle(null)} className="p-2 text-slate-400"><SafeIcon name="ChevronLeft" size={24} /></button>
                        <div className="text-center"><div className="text-[10px] font-bold text-blue-600 uppercase">{selectedVehicle.plate}</div><h1 className="text-sm font-black">{selectedVehicle.name}</h1></div>
                        <div className="w-10"></div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 pb-24 animate-in">
                        {activeTab === 'bookings' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center"><h2 className="font-black text-slate-700 flex items-center gap-2"><SafeIcon name="Calendar" className="text-blue-500"/> 預約表</h2><button onClick={() => setModal({open:true, type:'booking', data:{}})} className="bg-blue-600 text-white p-2 rounded-full"><SafeIcon name="Plus"/></button></div>
                                {filteredBookings.length === 0 ? <div className="text-center py-20 text-slate-300 text-sm">尚無預約</div> : filteredBookings.map(b => (
                                    <div key={b.id} className="bg-white p-4 rounded-2xl border border-slate-100 flex gap-4 shadow-sm">
                                        <div className="bg-blue-50 text-blue-600 p-2 rounded-lg text-center min-w-[50px]"><div className="text-xs font-black">{b.date?.split('-')[1]}/{b.date?.split('-')[2]}</div></div>
                                        <div className="flex-1"><div className="font-bold flex justify-between">{b.reason}<button onClick={() => deleteEntry('bookings', b.id)} className="text-slate-200"><SafeIcon name="Trash2" size={14}/></button></div><div className="text-xs text-slate-400 mt-1">{b.startTime} - {b.endTime} | {b.applicant}</div></div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'logs' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center"><h2 className="font-black text-slate-700 flex items-center gap-2"><SafeIcon name="ClipboardList" className="text-green-500"/> 行車記錄</h2><button onClick={() => setModal({open:true, type:'log', data:{}})} className="bg-green-600 text-white p-2 rounded-full"><SafeIcon name="Plus"/></button></div>
                                {filteredLogs.length === 0 ? <div className="text-center py-20 text-slate-300 text-sm">尚無記錄</div> : filteredLogs.map(l => (
                                    <div key={l.id} className="bg-white p-4 rounded-2xl border border-slate-100 space-y-2 shadow-sm">
                                        <div className="flex justify-between"><span className="text-[10px] font-bold text-slate-400 uppercase">{l.date}</span><button onClick={() => deleteEntry('logs', l.id)} className="text-slate-200"><SafeIcon name="Trash2" size={14}/></button></div>
                                        <div className="flex justify-between items-end"><div className="flex-1"><div className="font-bold text-slate-700">{l.destination}</div><div className="text-[10px] text-slate-400">{l.userId} | {l.reason}</div></div><div className="text-right text-green-600 font-black">+{l.totalMileage} km</div></div>
                                        {l.fuelCost > 0 && <div className="text-[10px] text-amber-600 bg-amber-50 px-2 py-1 rounded inline-block">加油: ${l.fuelCost} / {l.fuelLiters}L</div>}
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'dashboard' && (
                            <div className="space-y-5">
                                <div className="flex gap-2">
                                    <select className="flex-1 bg-white border-0 rounded-xl p-3 text-xs font-bold shadow-sm" value={monthFilter} onChange={e => setMonthFilter(e.target.value)}><option value="all">全部月份</option>{monthOptions.map(m => <option key={m} value={m}>{m}</option>)}</select>
                                    <select className="flex-1 bg-white border-0 rounded-xl p-3 text-xs font-bold shadow-sm" value={driverFilter} onChange={e => setDriverFilter(e.target.value)}><option value="all">全部駕駛</option>{users.map(u => <option key={u.id} value={u.name}>{u.name}</option>)}</select>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="col-span-2 bg-blue-600 p-5 rounded-3xl text-white shadow-lg shadow-blue-100"><div className="text-xs opacity-80 uppercase">總里程</div><div className="text-4xl font-black">{stats.totalMiles.toLocaleString()} <span className="text-sm font-normal">km</span></div></div>
                                    <div className="bg-white p-4 rounded-2xl shadow-sm"><div className="text-[10px] text-slate-400 mb-1 uppercase">累積油資</div><div className="text-xl font-black text-slate-700">${stats.totalCost.toLocaleString()}</div></div>
                                    <div className="bg-white p-4 rounded-2xl shadow-sm"><div className="text-[10px] text-slate-400 mb-1 uppercase">平均油耗</div><div className="text-xl font-black text-green-600">{stats.avg} <span className="text-[10px]">km/L</span></div></div>
                                </div>
                                {driverFilter === 'all' && stats.rank.length > 0 && (
                                    <div className="bg-white rounded-2xl border border-slate-100 divide-y overflow-hidden shadow-sm">
                                        <div className="p-3 bg-slate-50 text-[10px] font-bold text-center text-slate-400">駕駛里程統計</div>
                                        {stats.rank.map(r => (<div key={r.n} className="p-3 flex justify-between text-sm"><span className="font-bold">{r.n}</span><span className="text-slate-500 font-mono">{r.m} km</span></div>))}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="space-y-4">
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 divide-y">
                                    <div className="p-5">
                                        <h3 className="text-xs font-bold text-slate-400 mb-4 uppercase">人員管理</h3>
                                        <div className="space-y-2">
                                            {users.map(u => (<div key={u.id} className="flex justify-between items-center p-3 bg-slate-50 rounded-xl"><span className="font-bold text-sm">{u.name}</span><button onClick={() => deleteEntry('users', u.id)} className="text-red-300"><SafeIcon name="Trash2" size={16}/></button></div>))}
                                            <button onClick={() => setModal({open:true, type:'user', data:{}})} className="w-full py-3 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 text-xs font-bold">+ 新增人員</button>
                                        </div>
                                    </div>
                                    <div className="p-5">
                                        <button onClick={exportReport} className="w-full flex justify-between items-center p-4 bg-slate-800 text-white rounded-2xl shadow-lg active:scale-95 transition-all"><span className="font-bold text-sm">下載 CSV 報表</span><SafeIcon name="Download" size={18}/></button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[448px] bg-white/80 backdrop-blur-md border-t border-slate-100 flex justify-around py-4 pb-8 z-40">
                        {selectedVehicle.hasBooking && (<button onClick={() => setActiveTab('bookings')} className={`flex flex-col items-center gap-1 ${activeTab==='bookings'?'text-blue-600':'text-slate-300'}`}><SafeIcon name="Calendar"/><span className="text-[10px] font-bold">預約</span></button>)}
                        <button onClick={() => setActiveTab('logs')} className={`flex flex-col items-center gap-1 ${activeTab==='logs'?'text-green-600':'text-slate-300'}`}><SafeIcon name="ClipboardList"/><span className="text-[10px] font-bold">記錄</span></button>
                        <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center gap-1 ${activeTab==='dashboard'?'text-purple-600':'text-slate-300'}`}><SafeIcon name="BarChart3"/><span className="text-[10px] font-bold">統計</span></button>
                        <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center gap-1 ${activeTab==='settings'?'text-slate-900':'text-slate-300'}`}><SafeIcon name="Settings"/><span className="text-[10px] font-bold">設定</span></button>
                    </nav>

                    {modal.open && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end justify-center">
                            <div className="bg-white w-full max-w-[448px] rounded-t-[2.5rem] p-8 shadow-2xl animate-in">
                                <div className="flex justify-between items-center mb-6"><h3 className="text-xl font-black text-slate-800 uppercase">{modal.type==='user'?'新增人員':modal.type==='booking'?'預約車輛':'行車記錄'}</h3><button onClick={() => setModal({...modal, open:false})} className="p-2 bg-slate-50 rounded-full"><SafeIcon name="X"/></button></div>
                                <form onSubmit={handleSave} className="space-y-4">
                                    {modal.type === 'user' && (<div><label className="text-xs font-bold text-slate-400 block mb-1">人員全名</label><input required className="w-full bg-slate-50 border-0 rounded-xl p-4 font-bold" onChange={e => setModal({...modal, data:{...modal.data, name: e.target.value}})}/></div>)}
                                    {modal.type === 'booking' && (<div className="space-y-3">
                                        <input required type="date" className="w-full bg-slate-50 border-0 rounded-xl p-4 font-bold" onChange={e => setModal({...modal, data:{...modal.data, date: e.target.value}})}/>
                                        <div className="flex gap-2"><input required type="time" className="flex-1 bg-slate-50 border-0 rounded-xl p-4 font-bold" onChange={e => setModal({...modal, data:{...modal.data, startTime: e.target.value}})}/><input required type="time" className="flex-1 bg-slate-50 border-0 rounded-xl p-4 font-bold" onChange={e => setModal({...modal, data:{...modal.data, endTime: e.target.value}})}/></div>
                                        <select required className="w-full bg-slate-50 border-0 rounded-xl p-4 font-bold text-sm" onChange={e => setModal({...modal, data:{...modal.data, applicant: e.target.value}})}><option value="">選擇人員</option>{users.map(u => <option key={u.id} value={u.name}>{u.name}</option>)}</select>
                                        <input required className="w-full bg-slate-50 border-0 rounded-xl p-4 font-bold" placeholder="使用事由" onChange={e => setModal({...modal, data:{...modal.data, reason: e.target.value}})}/>
                                    </div>)}
                                    {modal.type === 'log' && (<div className="space-y-3">
                                        <input required type="date" className="w-full bg-slate-50 border-0 rounded-xl p-4 font-bold" onChange={e => setModal({...modal, data:{...modal.data, date: e.target.value}})}/>
                                        <div className="flex gap-2"><input required type="number" placeholder="起始里程" className="flex-1 bg-slate-50 border-0 rounded-xl p-4 font-bold" onChange={e => setModal({...modal, data:{...modal.data, startMileage: e.target.value}})}/><input required type="number" placeholder="結束里程" className="flex-1 bg-slate-50 border-0 rounded-xl p-4 font-bold" onChange={e => setModal({...modal, data:{...modal.data, endMileage: e.target.value}})}/></div>
                                        <div className="bg-amber-50 p-4 rounded-2xl flex gap-2"><input type="number" placeholder="加油金額" className="flex-1 bg-white border-0 rounded-lg p-2 text-xs" onChange={e => setModal({...modal, data:{...modal.data, fuelCost: e.target.value}})}/><input type="number" step="0.01" placeholder="公升" className="flex-1 bg-white border-0 rounded-lg p-2 text-xs" onChange={e => setModal({...modal, data:{...modal.data, fuelLiters: e.target.value}})}/></div>
                                        <select required className="w-full bg-slate-50 border-0 rounded-xl p-4 font-bold text-sm" onChange={e => setModal({...modal, data:{...modal.data, userId: e.target.value}})}><option value="">選擇駕駛</option>{users.map(u => <option key={u.id} value={u.name}>{u.name}</option>)}</select>
                                        <div className="flex gap-2"><input required className="flex-1 bg-slate-50 border-0 rounded-xl p-4 font-bold" placeholder="地點" onChange={e => setModal({...modal, data:{...modal.data, destination: e.target.value}})}/><input required className="flex-1 bg-slate-50 border-0 rounded-xl p-4 font-bold" placeholder="事由" onChange={e => setModal({...modal, data:{...modal.data, reason: e.target.value}})}/></div>
                                    </div>)}
                                    <button className="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] font-black shadow-xl active:scale-95 transition-all mt-4 uppercase">確認儲存</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // 啟動 App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // 共用刪除函式 (定義在作用域外)
        function deleteEntry(collName, id) {
            if (!window.confirm('確定要刪除嗎？')) return;
            db.collection('artifacts').doc(DATABASE_ROOT_ID).collection('public').doc('data').collection(collName).doc(id).delete();
        }
    </script>
</body>
</html>
